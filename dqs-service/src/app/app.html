<div class="header">
  <img src="assets/logo.png" style="width:180px; height:30px;">
  <div class="title">Data Quality Service</div>
</div>

<div class="controls">
  <label for="repo">Repository:</label>
  <select id="repo" [(ngModel)]="selectedRepo">
    <option *ngFor="let repo of repositories" [value]="repo.name">{{ repo.name }}</option>
  </select>
  <button (click)="run()">Run</button>
</div>

<div *ngIf="loading()" style="margin-top:20px; text-align:center;">
  Loading results...
</div>

<div class="table-container">
  <table *ngIf="!loading()">
    <thead>
      <tr>
        <th>Category</th>
        <th>Dimension Name</th>
        <th>Result</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of results()">
        <td>{{ r.category }}</td>
        <td>{{ r.dimension }}</td>
        <td [ngStyle]="{'color': getColor(r.result)}">
          {{ r.result !== undefined ? r.result + '%' : '' }}
        </td>
      </tr>
    </tbody>
  </table>
</div>
